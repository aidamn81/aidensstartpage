<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relic & Folder System</title>
    <style>
        :root {
            --bg: #1a1a1a;
            --folder-bg: #2c2c2c;
            --relic-bg: #3d3d3d;
            --accent: #007aff;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            padding: 30px;
            user-select: none;
        }

        /* Container Item */
        .grid-item {
            width: 110px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            cursor: grab;
            transition: transform 0.2s;
        }

        /* The Visual "Icon" */
        .icon-box {
            width: 90px;
            height: 90px;
            border-radius: 20px;
            background-size: cover;
            background-position: center;
            background-color: var(--relic-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            pointer-events: none; /* Let drag events hit the parent */
        }

        .folder .icon-box {
            background-color: var(--folder-bg);
            border: 2px solid #444;
        }

        .label {
            font-size: 13px;
            text-align: center;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Dragging & Wiggling */
        .dragging {
            opacity: 0.5;
            transform: scale(1.1);
        }

        .wiggle {
            animation: wiggleAnim 0.3s infinite;
        }

        @keyframes wiggleAnim {
            0% { transform: rotate(-1.5deg); }
            50% { transform: rotate(1.5deg); }
            100% { transform: rotate(-1.5deg); }
        }

        /* Folder Hover State */
        .folder-hover {
            transform: scale(1.15);
            border-color: var(--accent) !important;
        }

        /* Menu Bar / Controls */
        #contextMenu {
            position: fixed;
            background: #252525;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 5px 0;
            z-index: 1000;
            display: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .menu-btn {
            padding: 10px 20px;
            cursor: pointer;
            font-size: 14px;
            color: #eee;
        }

        .menu-btn:hover { background: var(--accent); }
        .menu-btn.del { color: #ff453a; }

    </style>
</head>
<body>

    <div class="grid-item folder" draggable="true" data-id="1">
        <div class="icon-box">📂</div>
        <div class="label">Work Folder</div>
    </div>

    <div class="grid-item relic" draggable="true" data-id="2">
        <div class="icon-box">📄</div>
        <div class="label">Project Alpha</div>
    </div>

    <div class="grid-item relic" draggable="true" data-id="3">
        <div class="icon-box">🖼️</div>
        <div class="label">Cover Art</div>
    </div>

    <div id="contextMenu">
        <div class="menu-btn" onclick="changeCover()">Change Cover Image</div>
        <div class="menu-btn" onclick="renameItem()">Rename</div>
        <div class="menu-btn del" onclick="deleteItem()">Delete</div>
    </div>

<script>
    let draggedItem = null;
    let contextTarget = null;
    const menu = document.getElementById('contextMenu');

    // --- Drag and Drop Logic ---
    document.addEventListener('dragstart', (e) => {
        if (e.target.classList.contains('grid-item')) {
            draggedItem = e.target;
            draggedItem.classList.add('dragging', 'wiggle');
            e.dataTransfer.setData('text/plain', ''); // Required for Firefox
        }
    });

    document.addEventListener('dragend', (e) => {
        if (draggedItem) {
            draggedItem.classList.remove('dragging', 'wiggle');
            draggedItem = null;
        }
        document.querySelectorAll('.folder').forEach(f => f.classList.remove('folder-hover'));
    });

    document.addEventListener('dragover', (e) => {
        e.preventDefault();
        const target = e.target.closest('.folder');
        
        // Visual feedback when hovering a folder
        document.querySelectorAll('.folder').forEach(f => f.classList.remove('folder-hover'));
        if (target && target !== draggedItem) {
            target.classList.add('folder-hover');
        }
    });

    document.addEventListener('drop', (e) => {
        e.preventDefault();
        const dropTarget = e.target.closest('.grid-item');
        
        if (draggedItem && dropTarget && dropTarget !== draggedItem) {
            if (dropTarget.classList.contains('folder')) {
                // Drop inside folder logic
                alert(`Moved "${draggedItem.innerText.trim()}" into "${dropTarget.innerText.trim()}"`);
                draggedItem.remove();
            } else {
                // Swap/Reorder logic
                const parent = dropTarget.parentNode;
                parent.insertBefore(draggedItem, dropTarget.nextSibling);
            }
        }
    });

    // --- Options / Actions Logic ---
    window.addEventListener('contextmenu', (e) => {
        const target = e.target.closest('.grid-item');
        if (target) {
            e.preventDefault();
            contextTarget = target;
            menu.style.display = 'block';
            menu.style.left = e.pageX + 'px';
            menu.style.top = e.pageY + 'px';
        }
    });

    window.addEventListener('click', () => {
        menu.style.display = 'none';
    });

    function renameItem() {
        const label = contextTarget.querySelector('.label');
        const newName = prompt("Rename to:", label.innerText);
        if (newName) label.innerText = newName;
    }

    function changeCover() {
        const icon = contextTarget.querySelector('.icon-box');
        const url = prompt("Paste Image URL:");
        if (url) {
            icon.innerText = ""; // Remove emoji
            icon.style.backgroundImage = `url('${url}')`;
        }
    }

    function deleteItem() {
        if (confirm("Are you sure you want to delete this?")) {
            contextTarget.remove();
        }
    }
</script>

</body>
</html>
